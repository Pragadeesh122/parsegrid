services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: parsegrid
      POSTGRES_PASSWORD: parsegrid
      POSTGRES_DB: parsegrid
    ports:
      - "5436:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parsegrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info -Q ocr,extraction,merge,translation,default --concurrency=2
    env_file:
      - ../apps/api/.env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://parsegrid:parsegrid@postgres:5432/parsegrid
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "8002:5540"
    depends_on:
      redis:
        condition: service_healthy

  # Phase 2 — Uncomment when needed
